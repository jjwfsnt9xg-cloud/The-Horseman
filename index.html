<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Website with 3D Cube</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.152.0/build/three.min.js"></script>
</head>
<body>
  <!-- Hero Section -->
  <section style="text-align:center; padding:50px; background:#f0f0f0;">
    <h1>Welcome to My Website</h1>
    <p>This is your hero section.</p>
  </section>
  
  <!-- Container for 3D scene -->
  <div id="three-container" style="width:100%; height:400px; margin-top:20px;"></div>
  
  <!-- 3D scene script -->
  <script>
    // Initialize scene, camera, renderer
    const scene = new THREE.Scene();

    const container = document.getElementById('three-container');

    const camera = new THREE.PerspectiveCamera(
      75,
      container.clientWidth / 400,
      0.1,
      1000
    );

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(container.clientWidth, 400);
    container.appendChild(renderer.domElement);

    // Create a cube geometry and material
    const geometry = new THREE.BoxGeometry(1, 1, 1);
    const material = new THREE.MeshStandardMaterial({ color: 0xffcc00 });
    const cube = new THREE.Mesh(geometry, material);
    scene.add(cube);

    // Add lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
    scene.add(ambientLight);
    const pointLight = new THREE.PointLight(0xffffff, 1);
    pointLight.position.set(2, 2, 2);
    scene.add(pointLight);

    // Position the camera
    camera.position.z = 3;

    // Animate
    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.01;
      renderer.render(scene, camera);
    }

    animate();

    // Responsive resize
    window.addEventListener('resize', () => {
      const width = container.clientWidth;
      renderer.setSize(width, 400);
      camera.aspect = width / 400;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
