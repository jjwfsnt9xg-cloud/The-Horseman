<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Horseman's Journal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="hero.css" />
</head>
<body>

  <!-- Three.js renders here — fullscreen behind everything -->
  <canvas id="hero-canvas"></canvas>

  <!-- Text overlay on top of the 3D scene -->
  <section class="hero" id="genesis">
    <div class="hero-content">
      <p class="hero-pre">Welcome to the world of</p>

      <h1 class="hero-title">
        The <span class="gold">Horseman's</span><br />Journal
      </h1>

      <div class="hero-divider">
        <div class="dline"></div>
        <div class="dgem"></div>
        <div class="dline"></div>
      </div>

      <p class="hero-tagline">
        Where legends are written, stories ride eternal<br />
        and every word echoes through the ages
      </p>

      <div class="hero-cta">
        <button class="cta-primary" onclick="window.location.href='genesis.html'">
          Enter the Journey
        </button>
        <button class="cta-secondary" onclick="window.location.href='chronicles.html'">
          Explore the World
        </button>
      </div>
    </div>

    <!-- Animated scroll indicator -->
    <div class="scroll-hint">
      <div class="scroll-mouse">
        <div class="scroll-wheel"></div>
      </div>
      <span class="scroll-label">Scroll</span>
    </div>
  </section>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="hero.js"></script>
</body>
</html>
