<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Questions - The Horseman's Journal</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@300;400;500;600;700;900&family=Raleway:wght@300;400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: #0d0804;
      color: rgba(235, 225, 200, 0.85);
      font-family: 'EB Garamond', serif;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* ORBS — warm earth bronze */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
    }
    .orb1 {
      width: 55vw; height: 55vw;
      top: -12vh; right: -12vw;
      background: radial-gradient(circle, rgba(200, 150, 60, 0.09), transparent);
    }
    .orb2 {
      width: 45vw; height: 45vw;
      bottom: -8vh; left: -18vw;
      background: radial-gradient(circle, rgba(180, 120, 40, 0.05), transparent);
    }
    .orb3 {
      width: 35vw; height: 35vw;
      top: 45vh; left: 32vw;
      background: radial-gradient(circle, rgba(160, 100, 30, 0.035), transparent);
    }

    /* ═══════════════════════════════════════════════
       NAVBAR — BRONZE EARTH TINT
    ═══════════════════════════════════════════════ */
    .navbar-wrapper {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      justify-content: center;
      padding: 1.5rem 2rem 0;
      pointer-events: none;
    }
    .navbar-wrapper * { pointer-events: auto; }
    .scene {
      perspective: 700px;
      perspective-origin: 50% 60%;
      width: 100%;
      max-width: 1020px;
    }
    .nav3d {
      position: relative;
      transform-style: preserve-3d;
      transform: rotateX(28deg) rotateY(0deg);
      transition: transform .5s cubic-bezier(.23,1,.32,1);
      height: 64px;
    }
    .nav3d:hover { transform: rotateX(8deg) rotateY(2deg); }
    .face { position: absolute; border-radius: 18px; }
    .face-top {
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(180,140,60,0.08) 40%, rgba(255,255,255,0.04) 100%);
      border: 1px solid rgba(180,140,60,0.45);
      border-bottom-color: rgba(180,140,60,0.15);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.25), inset 0 -1px 0 rgba(0,0,0,0.2), 0 0 60px rgba(180,140,50,0.06);
      z-index: 4;
    }
    .face-back {
      inset: 0;
      background: rgba(160,120,40,0.04);
      border: 1px solid rgba(180,140,60,0.2);
      transform: translateZ(-36px);
      z-index: 1;
    }
    .face-bottom-wall {
      left: 18px; right: 18px; bottom: -36px; height: 36px;
      background: linear-gradient(180deg, rgba(160,120,50,0.18) 0%, rgba(70,40,0,0.08) 60%, rgba(0,0,0,0.02) 100%);
      border-left: 1px solid rgba(180,140,60,0.15);
      border-right: 1px solid rgba(180,140,60,0.15);
      border-bottom: 1px solid rgba(180,140,60,0.1);
      border-radius: 0 0 12px 12px;
      transform-origin: top center; transform: rotateX(-90deg); z-index: 2;
    }
    .face-top-wall {
      left: 18px; right: 18px; top: -5px; height: 5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.3), rgba(180,140,60,0.2));
      border-radius: 18px 18px 0 0;
      transform-origin: bottom center; transform: rotateX(90deg); z-index: 3;
    }
    .face-left-wall {
      top: 4px; bottom: 4px; left: -36px; width: 36px;
      background: linear-gradient(90deg, rgba(0,0,0,0) 0%, rgba(160,120,50,0.1) 100%);
      border: 1px solid rgba(180,140,60,0.1);
      border-radius: 12px 0 0 12px;
      transform-origin: right center; transform: rotateY(-90deg); z-index: 2;
    }
    .face-right-wall {
      top: 4px; bottom: 4px; right: -36px; width: 36px;
      background: linear-gradient(270deg, rgba(0,0,0,0) 0%, rgba(160,120,50,0.1) 100%);
      border: 1px solid rgba(180,140,60,0.1);
      border-radius: 0 12px 12px 0;
      transform-origin: left center; transform: rotateY(90deg); z-index: 2;
    }
    .nav-content {
      position: absolute; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.8rem; transform: translateZ(1px);
    }
    .brand {
      font-family: 'Cinzel', serif;
      font-size: .85rem; font-weight: 700;
      color: #E8C84A;
      letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.25;
      text-shadow: 0 0 24px rgba(180,140,50,0.8), 0 0 60px rgba(180,140,50,0.3);
      flex-shrink: 0; text-decoration: none;
    }
    .brand small {
      display: block; font-size: .52rem; letter-spacing: 4px;
      color: rgba(180,140,50,0.4); font-weight: 400; margin-top: 1px;
    }
    .links { display: flex; gap: .05rem; list-style: none; }
    .links li a {
      display: block; font-size: .62rem; font-weight: 600; letter-spacing: 2px;
      color: rgba(255,240,180,0.5); text-decoration: none;
      padding: 6px 8px; border-radius: 8px; transition: all .25s;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8); position: relative; white-space: nowrap;
    }
    .links li a:hover {
      color: #FFF8DC; background: rgba(255,255,255,0.07);
      text-shadow: 0 0 16px rgba(180,140,50,0.9), 0 0 40px rgba(180,140,50,0.4);
    }
    .portal-scene { perspective: 300px; flex-shrink: 0; }
    .portal-btn {
      position: relative; transform-style: preserve-3d;
      transform: rotateX(22deg); transition: transform .25s;
      display: inline-block; border: none; background: transparent; padding: 0; cursor: pointer;
    }
    .portal-btn:hover { transform: rotateX(5deg) translateY(-2px); }
    .portal-btn:active { transform: rotateX(30deg) translateY(2px); }
    .portal-top {
      display: block; padding: 8px 18px;
      background: linear-gradient(135deg, rgba(255,255,255,0.22) 0%, rgba(180,140,50,0.38) 50%, rgba(140,90,20,0.28) 100%);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(180,140,50,0.7);
      border-bottom-color: rgba(180,140,50,0.2);
      border-radius: 100px;
      font-family: 'Raleway', sans-serif;
      font-size: .65rem; font-weight: 700; letter-spacing: 2.5px;
      color: #FFF8DC; text-shadow: 0 0 12px rgba(180,140,50,0.9);
      position: relative; z-index: 3; white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .portal-wall {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(100,60,20,0.6), rgba(40,20,5,0.4));
      border-radius: 100px; transform: translateZ(-14px); z-index: 2;
      border: 1px solid rgba(80,40,10,0.5);
    }
    .portal-glow {
      position: absolute; inset: -4px; border-radius: 100px; background: transparent;
      box-shadow: 0 0 20px rgba(180,140,50,0.4), 0 0 60px rgba(180,140,50,0.15);
      transform: translateZ(-7px); z-index: 1;
    }

    /* ═══════════════════════════════════════════════
       HERO — THE ARENA AT DAWN
    ═══════════════════════════════════════════════ */
    .questions-hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 650px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; z-index: 0;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(8,4,2,0.75) 90%);
      z-index: 1; pointer-events: none;
    }
    .hero-content {
      position: relative; z-index: 10;
      text-align: center; max-width: 900px; padding: 0 2rem;
      animation: heroFloat 6s ease-in-out infinite;
    }
    @keyframes heroFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .6rem; letter-spacing: 8px;
      color: rgba(200, 150, 60, 0.5);
      text-transform: uppercase; display: block; margin-bottom: 1.5rem;
    }
    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2.5rem, 6vw, 5.2rem);
      font-weight: 700; color: #ffffff;
      letter-spacing: 3px; line-height: 1.05; margin-bottom: 1.5rem;
      text-shadow: 0 0 80px rgba(180, 130, 40, 0.35), 0 0 160px rgba(160, 110, 30, 0.2), 0 4px 60px rgba(0,0,0,0.6);
      transition: text-shadow .8s ease, color .8s ease;
    }
    .hero-title .gold {
      color: #E8C84A;
      text-shadow: 0 0 60px rgba(180, 130, 40, 0.7), 0 0 120px rgba(180, 130, 40, 0.3);
      transition: text-shadow .8s ease;
    }
    .hero-divider {
      display: flex; align-items: center; justify-content: center;
      gap: 1.2rem; margin-bottom: 1.5rem;
    }
    .hero-dline {
      width: 90px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(200, 150, 60, 0.5));
    }
    .hero-dline.r { background: linear-gradient(90deg, rgba(200, 150, 60, 0.5), transparent); }
    .hero-dgem {
      width: 8px; height: 8px; background: #E8C84A;
      transform: rotate(45deg); box-shadow: 0 0 18px rgba(200, 150, 60, 0.9);
      transition: box-shadow .8s ease;
    }
    .hero-tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1rem, 2vw, 1.3rem);
      color: rgba(225, 205, 165, 0.6);
      letter-spacing: .5px; max-width: 600px; margin: 0 auto; line-height: 1.7;
      transition: color .8s ease;
    }
    .hero-scroll {
      position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: fadeUpDown 2.5s ease-in-out infinite;
    }
    .hero-scroll span {
      font-family: 'Cinzel', serif; font-size: .52rem; letter-spacing: 5px;
      color: rgba(200, 150, 60, 0.45); text-transform: uppercase;
    }
    .hero-scroll svg { width: 18px; stroke: rgba(200, 150, 60, 0.45); }
    @keyframes fadeUpDown {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.3; }
      50% { transform: translateX(-50%) translateY(8px); opacity: 0.75; }
    }

    /* ═══════════════════════════════════════════════
       QUESTION CARDS
    ═══════════════════════════════════════════════ */
    .questions-section {
      padding: 3rem 2rem 8rem;
      position: relative; z-index: 2;
      max-width: 1100px; margin: 0 auto;
    }
    .questions-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem 1.5rem;
    }
    @media (max-width: 900px) { .questions-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 550px) { .questions-grid { grid-template-columns: 1fr; } }

    .q-card {
      background: linear-gradient(160deg, rgba(30,20,10,0.7), rgba(15,10,3,0.8));
      border: 1px solid rgba(180,140,60,0.12);
      border-radius: 6px;
      padding: 2rem 1.8rem;
      cursor: pointer;
      transition: all .4s ease;
      position: relative;
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
    }
    .q-card.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .q-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(180,140,60,0.06), transparent 70%);
      opacity: 0;
      transition: opacity .4s ease;
    }
    .q-card:hover::before { opacity: 1; }
    .q-card:hover {
      border-color: rgba(180,140,60,0.3);
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(180,140,60,0.12);
    }
    .q-card.active {
      border-color: rgba(200,150,60,0.5);
      background: linear-gradient(160deg, rgba(40,28,12,0.8), rgba(20,12,4,0.85));
      box-shadow: 0 0 40px rgba(180,130,40,0.15), 0 0 0 1px rgba(200,150,60,0.2);
    }
    .q-card-category {
      font-family: 'Cinzel', serif;
      font-size: .48rem; letter-spacing: 3px;
      color: rgba(200,150,60,0.5); text-transform: uppercase;
      margin-bottom: .8rem; display: block;
    }
    .q-card-num {
      position: absolute; top: 16px; right: 18px;
      font-family: 'Cinzel Decorative', serif;
      font-size: 2.5rem; color: rgba(200,150,60,0.06);
      pointer-events: none; line-height: 1;
    }
    .q-card-title {
      font-family: 'Cinzel', serif;
      font-size: .85rem; font-weight: 600;
      color: #e8dfc7; letter-spacing: .5px;
      line-height: 1.35; margin-bottom: .6rem;
      transition: color .3s ease;
    }
    .q-card:hover .q-card-title { color: #E8C84A; }
    .q-card-excerpt {
      font-family: 'EB Garamond', serif;
      font-size: .82rem; line-height: 1.6;
      color: rgba(220, 200, 160, 0.45);
      display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .q-card-arrow {
      font-family: 'Cinzel', serif;
      font-size: .5rem; letter-spacing: 3px;
      color: rgba(200,150,60,0.3); text-transform: uppercase;
      margin-top: 1rem; display: inline-block;
      transition: all .3s ease;
    }
    .q-card:hover .q-card-arrow {
      color: #E8C84A; transform: translateX(4px);
    }

    /* ═══════════════════════════════════════════════
       ANSWER PANEL
    ═══════════════════════════════════════════════ */
    .answer-panel {
      position: fixed; inset: 0; z-index: 500;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .5s ease;
    }
    .answer-panel.open {
      opacity: 1; pointer-events: all;
    }
    .answer-backdrop {
      position: absolute; inset: 0;
      background: rgba(6, 3, 1, 0.93);
      backdrop-filter: blur(8px);
    }
    .answer-viewer {
      position: relative; z-index: 2;
      background: linear-gradient(160deg, #120c06 0%, #1a1008 50%, #0d0704 100%);
      border: 1px solid rgba(180,140,60,0.2);
      border-radius: 8px;
      max-width: 780px; width: 92%; max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      transform: scale(.93) translateY(20px);
      transition: transform .5s cubic-bezier(.16,1,.32,1);
    }
    .answer-panel.open .answer-viewer {
      transform: scale(1) translateY(0);
    }
    .answer-viewer::-webkit-scrollbar { width: 3px; }
    .answer-viewer::-webkit-scrollbar-thumb { background: rgba(180,140,60,0.2); border-radius: 2px; }

    .answer-close {
      position: sticky; top: 16px; float: right; margin-right: 16px; z-index: 20;
      width: 32px; height: 32px;
      border: 1px solid rgba(180,140,60,0.3); border-radius: 50%;
      background: rgba(0,0,0,0.5); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s;
    }
    .answer-close:hover {
      border-color: rgba(200,150,60,0.6);
      background: rgba(200,150,60,0.1);
    }
    .answer-close::before, .answer-close::after {
      content: ''; position: absolute; width: 12px; height: 1px;
      background: rgba(200,150,60,0.7);
    }
    .answer-close::before { transform: rotate(45deg); }
    .answer-close::after { transform: rotate(-45deg); }

    .answer-content {
      padding: 1.5rem 3rem 3.5rem;
    }
    .answer-num {
      font-family: 'Cinzel', serif;
      font-size: .5rem; letter-spacing: 4px;
      color: rgba(200,150,60,0.4); text-transform: uppercase;
      display: block; margin-bottom: .5rem;
    }
    .answer-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(1.2rem, 2.5vw, 1.7rem);
      font-weight: 700; color: #E8C84A;
      letter-spacing: 1px; line-height: 1.25; margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(180,130,40,0.25);
    }
    .answer-body {
      font-family: 'EB Garamond', serif;
      font-size: clamp(.95rem, 1.4vw, 1.08rem);
      line-height: 2.05; color: rgba(235,220,195,0.78);
    }
    .answer-body p { margin-bottom: 1.3rem; }
    .answer-body p:first-child::first-letter {
      font-family: 'Cinzel Decorative', serif;
      font-size: 3.2em; font-weight: 700; color: #E8C84A;
      float: left; line-height: .7; margin: .06em .08em 0 0;
      text-shadow: 0 0 18px rgba(200,150,60,0.4);
    }
    .answer-key {
      border-left: 3px solid rgba(200,150,60,0.35);
      padding: .8rem 1.1rem; margin: 1.3rem 0;
      font-style: italic; color: rgba(200,150,60,0.7);
      background: rgba(200,150,60,0.03);
      border-radius: 0 4px 4px 0;
    }
    .answer-nav {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 1.2rem; margin-top: 1.5rem;
      border-top: .5px solid rgba(180,140,60,0.1);
    }
    .answer-nav-btn {
      font-family: 'Cinzel', serif;
      font-size: .55rem; letter-spacing: 3px;
      color: rgba(200,150,60,0.45); text-transform: uppercase;
      background: none; border: none; cursor: pointer;
      transition: color .2s;
    }
    .answer-nav-btn:hover { color: #E8C84A; }
    .answer-nav-count {
      font-family: 'Cinzel', serif;
      font-size: .5rem; letter-spacing: 2px;
      color: rgba(200,150,60,0.25);
    }

    @media (max-width: 860px) {
      .navbar-wrapper { padding: 0.8rem 1rem 0; }
      .nav3d { height: 56px; transform: rotateX(15deg); }
      .brand { font-size: 0.7rem; }
      .links { gap: 0; }
      .links li a { font-size: .5rem; padding: 4px 5px; letter-spacing: 1px; }
      .portal-top { font-size: .52rem; padding: 6px 10px; }
      .answer-content { padding: 1.5rem 1.5rem 3rem; }
    }
    @media (max-width: 520px) {
      .brand small { display: none; }
      .links li a { font-size: .42rem; padding: 3px 4px; }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <!-- NAVBAR -->
  <div class="navbar-wrapper">
    <div class="scene">
      <nav class="nav3d">
        <div class="face face-back"></div>
        <div class="face face-bottom-wall"></div>
        <div class="face face-top-wall"></div>
        <div class="face face-left-wall"></div>
        <div class="face face-right-wall"></div>
        <div class="face face-top"></div>
        <div class="nav-content">
          <a href="index.html" class="brand">The Horseman's Journal<small>EST. MMXXVI</small></a>
          <ul class="links">
            <li><a href="index.html">GENESIS</a></li>
            <li><a href="genesis.html">AWAKENING</a></li>
            <li><a href="chronicles.html">CHRONICLES</a></li>
            <li><a href="companions.html">COMPANIONS</a></li>
            <li><a href="essays.html">VERSES</a></li>
            <li><a href="questions.html">QUESTIONS</a></li>
          </ul>
          <div class="portal-scene">
            <button class="portal-btn">
              <span class="portal-glow"></span>
              <span class="portal-wall"></span>
              <span class="portal-top">PORTAL ✦</span>
            </button>
          </div>
        </div>
      </nav>
    </div>
  </div>

  <!-- HERO — THE ARENA -->
  <section class="questions-hero" id="questionsHero">
    <canvas class="hero-canvas" id="heroCanvas"></canvas>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-eyebrow">The Horseman's Journal</span>
      <h1 class="hero-title" id="heroTitle">Quest<span class="gold">ions</span></h1>
      <div class="hero-divider">
        <div class="hero-dline"></div>
        <div class="hero-dgem"></div>
        <div class="hero-dline hero-dline r"></div>
      </div>
      <p class="hero-tagline" id="heroTagline">Straight from the arena. No theories. Only what works.</p>
    </div>
    <div class="hero-scroll">
      <span>Explore</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </div>
  </section>

  <!-- QUESTION CARDS -->
  <section class="questions-section">
    <div class="questions-grid" id="questionsGrid"></div>
  </section>

  <!-- ANSWER PANEL -->
  <div class="answer-panel" id="answerPanel">
    <div class="answer-backdrop" id="answerBackdrop"></div>
    <div class="answer-viewer" id="answerViewer">
      <button class="answer-close" id="answerClose"></button>
      <div class="answer-content" id="answerContent"></div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════
    // THE ARENA CANVAS — RESPONSIVE TO QUESTIONS
    // ═══════════════════════════════════════════════
    const canvas = document.getElementById('heroCanvas');
    const ctx = canvas.getContext('2d');
    let W, H;
    let mouseX = 0.5, mouseY = 0.5;
    let time = 0;
    let particles = [];
    let activeScene = -1; // -1 = calm arena
    let sceneTransition = 0; // 0 to 1

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    document.getElementById('questionsHero').addEventListener('mousemove', (e) => {
      mouseX = e.clientX / window.innerWidth;
      mouseY = e.clientY / window.innerHeight;
    });

    for (let i = 0; i < 70; i++) {
      particles.push({
        x: Math.random() * 1.3 - 0.15,
        y: Math.random() * 1.2,
        size: Math.random() * 2 + 0.3,
        speed: Math.random() * 0.3 + 0.06,
        opacity: Math.random() * 0.4 + 0.1,
        phase: Math.random() * Math.PI * 2,
        drift: (Math.random() - 0.5) * 0.4,
        baseSpeed: Math.random() * 0.3 + 0.06
      });
    }

    function drawSky() {
      const calmTop = '#1a2840';
      const calmBot = '#4a3520';
      const alertTop = '#2a1820';
      const alertBot = '#3a2015';
      const t = sceneTransition;
      const top = `rgb(${Math.round(26 + t*16)},${Math.round(40 - t*16)},${Math.round(64 - t*32)})`;
      const bot = `rgb(${Math.round(74 - t*24)},${Math.round(53 - t*28)},${Math.round(32 - t*12)})`;
      const grad = ctx.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, top);
      grad.addColorStop(1, bot);
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
    }

    function drawStars() {
      for (let i = 0; i < 40; i++) {
        const sx = (Math.sin(i * 127.1 + 311.7) * 0.5 + 0.5) * W;
        const sy = (Math.cos(i * 269.5 + 183.3) * 0.5 + 0.5) * H * 0.45;
        const twinkle = 0.3 + 0.7 * Math.abs(Math.sin(time * 0.012 + i * 2.7));
        ctx.fillStyle = `rgba(255,248,232,${twinkle * 0.18})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 0.4 + twinkle * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawArenaGround() {
      const grad = ctx.createLinearGradient(0, H * 0.7, 0, H);
      grad.addColorStop(0, '#3a2a15');
      grad.addColorStop(1, '#1a0f05');
      ctx.fillStyle = grad;
      ctx.fillRect(0, H * 0.7, W, H * 0.3);

      // Fence posts
      for (let i = 0; i < 12; i++) {
        const fx = W * 0.05 + i * W * 0.082;
        const fy = H * 0.68;
        ctx.fillStyle = '#2a1f12';
        ctx.fillRect(fx, fy, 3, H * 0.08);
      }
      // Rails
      ctx.strokeStyle = '#3a2a18';
      ctx.lineWidth = 1.5;
      for (let r = 0; r < 3; r++) {
        ctx.beginPath();
        ctx.moveTo(W * 0.02, H * 0.69 + r * H * 0.025);
        ctx.lineTo(W * 0.98, H * 0.69 + r * H * 0.025);
        ctx.stroke();
      }
    }

    function drawHorse(x, y, scale, state) {
      // state: 0=calm, 1=alert, 2=rearing, 3=approaching, 4=grazing
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      const bodyColor = '#1a1008';
      const highlightColor = '#2a1a0c';

      // Legs
      const legPoses = state === 2 ? [[-15, 20, 4, 35], [-3, 22, 4, 30], [7, 22, 4, 30], [17, 20, 4, 35]] :
                       state === 4 ? [[-16, 22, 4, 18], [-4, 22, 4, 20], [6, 22, 4, 20], [16, 22, 4, 18]] :
                       [[-16, 20, 4, 25], [-4, 20, 4, 27], [6, 20, 4, 27], [16, 20, 4, 25]];
      ctx.fillStyle = bodyColor;
      legPoses.forEach(l => ctx.fillRect(l[0], l[1], l[2], l[3]));

      // Body
      ctx.fillStyle = highlightColor;
      ctx.beginPath();
      ctx.ellipse(0, 8, 28, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      // Neck angle changes with state
      const neckBaseX = 20;
      const neckBaseY = 4;
      const headX = state === 1 ? 26 : state === 2 ? 24 : 22;
      const headY = state === 1 ? -38 : state === 2 ? -52 : state === 4 ? -20 : -30;

      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.moveTo(neckBaseX, neckBaseY);
      ctx.quadraticCurveTo(headX + 8, headY + 10, headX, headY);
      ctx.quadraticCurveTo(headX - 6, headY + 8, neckBaseX - 6, neckBaseY + 6);
      ctx.closePath();
      ctx.fill();

      // Head
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(headX, headY, 9, 5, -0.2, 0, Math.PI * 2);
      ctx.fill();

      // Ears
      const earAlert = state === 1 ? 1.3 : 1;
      ctx.beginPath();
      ctx.moveTo(headX + 2, headY - 4);
      ctx.lineTo(headX - 2, headY - 11 * earAlert);
      ctx.lineTo(headX - 4, headY - 5);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(headX + 4, headY - 4);
      ctx.lineTo(headX + 6, headY - 10 * earAlert);
      ctx.lineTo(headX + 2, headY - 5);
      ctx.fill();

      // Eye — white shows when alert
      if (state === 1) {
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(headX + 3, headY - 1, 1.8, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(headX + 3, headY - 1, 1, 0, Math.PI * 2);
      ctx.fill();

      // Tail
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-26, 6);
      const tailSwing = Math.sin(time * 0.04) * 4;
      ctx.quadraticCurveTo(-34, 0, -32 + tailSwing, -10);
      ctx.stroke();

      ctx.restore();
    }

    function drawHuman(x, y, scale, pose) {
      // pose: 0=standing calm, 1=reaching hand, 2=backing away
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(scale, scale);

      // Legs
      ctx.fillStyle = '#1a1512';
      ctx.fillRect(-4, 12, 3, 18);
      ctx.fillRect(2, 12, 3, 18);

      // Body
      ctx.fillStyle = '#2a2520';
      ctx.beginPath();
      ctx.ellipse(0, 2, 7, 13, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#3a3028';
      ctx.beginPath();
      ctx.arc(0, -14, 5, 0, Math.PI * 2);
      ctx.fill();

      // Arm
      ctx.strokeStyle = '#2a2520';
      ctx.lineWidth = 2;
      ctx.beginPath();
      const armEndX = pose === 1 ? 18 : pose === 2 ? -12 : 10;
      const armEndY = pose === 1 ? -12 : pose === 2 ? -6 : -4;
      ctx.moveTo(6, -4);
      ctx.lineTo(armEndX, armEndY);
      ctx.stroke();
      if (pose === 1) {
        ctx.fillStyle = '#3a3028';
        ctx.beginPath();
        ctx.arc(armEndX, armEndY, 2, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawParticles() {
      const alertFactor = sceneTransition;
      particles.forEach(p => {
        p.speed = p.baseSpeed + alertFactor * 0.5;
        const sx = p.x * W;
        const sy = p.y * H;
        const alpha = p.opacity * (0.4 + 0.6 * Math.sin(time * 0.025 + p.phase));
        const color = alertFactor > 0.5 ? 
          `rgba(255,200,150,${alpha})` : `rgba(240,220,170,${alpha})`;
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 2;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size * (1 + alertFactor * 0.5), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
      });
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      drawSky();
      drawStars();
      drawArenaGround();

      const hx = W * 0.55 + (mouseX - 0.5) * 20;
      const hy = H * 0.58 + (mouseY - 0.5) * 12;

      let horseState = 0;
      let humanPose = 0;
      if (activeScene === 1) horseState = 1; // spook: alert horse
      if (activeScene === 4) horseState = 2; // rear
      if (activeScene === 3) horseState = 0; // trust: calm
      if (activeScene === 12) horseState = 0; // bond: calm, close

      drawHuman(hx - 55, hy + 15, 0.8, humanPose);
      drawHorse(hx, hy, 1.1, horseState);
      drawParticles();
    }

    function animateCanvas() {
      time++;
      // Smooth transition
      const targetTransition = activeScene >= 0 ? 1 : 0;
      sceneTransition += (targetTransition - sceneTransition) * 0.05;
      particles.forEach(p => {
        p.y -= p.speed * 0.06;
        p.x += Math.sin(time * 0.015 + p.phase) * p.drift * 0.02;
        if (p.y < -0.1) { p.y = 1.05 + Math.random() * 0.15; p.x = Math.random() * 1.3 - 0.15; }
      });
      render();
      requestAnimationFrame(animateCanvas);
    }
    animateCanvas();

    // ═══════════════════════════════════════════════
    // QUESTIONS DATA
    // ═══════════════════════════════════════════════
    const questions = [
      {
        num: '01',
        category: 'Fear & Anxiety',
        title: 'Why does my horse spook at nothing?',
        excerpt: 'Your horse is not being stupid. It is reading a world you cannot fully perceive.',
        scene: 1,
        answer: `<p>The first thing to understand is that your horse is not spooking at nothing. It is spooking at something you did not detect. Horses possess sensory abilities far beyond ours. Their eyes are set on the sides of their head, giving them nearly 350 degrees of vision. Their ears rotate independently to track sounds from different directions simultaneously. Their nose can detect scents at concentrations we cannot register. When a horse spooks, it has detected something — a sound, a smell, a movement in the peripheral vision — that its sixty-million-year-old survival system has flagged as potentially dangerous.</p><p>This is not a flaw. It is the design working perfectly. The amygdala fires before the thinking brain has time to process. In twelve milliseconds, adrenaline floods the system. The body is already moving before the conscious mind catches up. You cannot reason with this response because reason arrives too late.</p><div class="answer-key">Fear in a horse is not a character flaw. It is sixty million years of perfect engineering. Your job is not to eliminate it. Your job is to become the thing the horse trusts more than it fears the unknown.</div><p>What you can do: First, stop punishing the spook. Punishment adds a second layer of threat. The horse now fears the original stimulus and the human beside it. Instead, become a source of calm. Breathe out. Soften your body. Let your stillness communicate that the environment is safe. Over time, the horse will begin to use your nervous system as a reference point. This is called co-regulation, and it is the foundation of genuine trust.</p>`
      },
      {
        num: '02',
        category: 'Behavior',
        title: 'Why does my horse not listen to me?',
        excerpt: 'A horse that seems to ignore you is not being stubborn. It is communicating.',
        scene: 2,
        answer: `<p>When a horse does not respond, the natural human reaction is to ask louder. More leg. More rein. More pressure. This is almost always the wrong response. A horse that is not listening is not defying you. It is telling you something. Your job is to figure out what.</p><p>There are three real reasons horses stop responding. The first is clarity. The horse does not understand what you are asking. You may think the signal is clear, but horses learn through the release of pressure, not the application of it. If the release is not timed precisely, the horse never learns what made the pressure stop.</p><p>The second reason is pain. Horses are stoic prey animals that hide discomfort. By the time a horse displays resistance, it may have been in pain for weeks or months. Check the back, the hocks, the teeth, the feet, the saddle fit. A horse that refuses to go forward or accept contact is often a horse in physical distress.</p><div class="answer-key">The third reason is trust. A horse that has learned that mistakes bring punishment will stop trying. It is not stubborn. It is being careful with the only body it has.</div><p>Before you escalate, ask: Is the ask clear? Is the horse in pain? Is there enough trust for the horse to try something uncertain? Answer those honestly, and the listening almost always returns.</p>`
      },
      {
        num: '03',
        category: 'Trust & Relationship',
        title: 'How do I build trust with a new horse?',
        excerpt: 'Trust is not earned in grand gestures. It is built in a thousand small, honest moments.',
        scene: 3,
        answer: `<p>Trust is not a feeling. It is a behavior. And like all behavior, it is built through repetition — through showing up the same way, every single time, without exception. The horse that sees the same person every day, with the same calm energy, the same predictable responses, learns that this person is safe.</p><p>Start by being worth approaching. Stand in the field without an agenda. Do not walk straight at the horse — that is predator behavior. Approach at an angle. Keep your eyes soft. Breathe slowly. Let the horse come the last step. The horse that walks toward you voluntarily has made a choice. That choice is the first real brick in the wall of trust.</p><div class="answer-key">The horse does not ask you to be perfect. It asks you to be consistent. Predictable. Safe. A creature it can read without confusion.</div><p>Every interaction either deposits into or withdraws from the trust account. Handle the horse with clarity. Move slowly through sensitive areas. If the horse braces, pause and wait for the release before continuing. End every session on a note of softness. The last thing that happens is what the horse carries into tomorrow.</p>`
      },
      {
        num: '04',
        category: 'Safety & Handling',
        title: 'Why does my horse rear or buck?',
        excerpt: 'Rearing and bucking are not defiance. They are a horse saying something is very wrong.',
        scene: 4,
        answer: `<p>Rearing and bucking are among the most dangerous behaviors a horse can display. But they are almost never acts of rebellion. They are communication — loud, desperate communication from a horse that has been trying to tell you something in quieter ways and has not been heard.</p><p>The most common cause is pain. A horse with a poorly fitting saddle, a sore back, dental issues, hock pain, or hoof discomfort may buck or rear because the pain becomes unbearable under saddle. Before you address the behavior, rule out physical causes. This is not optional. It is your responsibility.</p><p>Fear is the second major cause. A horse that feels trapped — between a rider's leg and a frightening object, or in a situation it cannot escape — may rear as a last resort. The horse is not fighting you. It is trying to survive.</p><div class="answer-key">When a horse rears or bucks, the worst thing you can do is punish it. Punishment confirms the horse's fear that the situation is dangerous and you are part of the danger.</div><p>What works: Get off if you are mounted. Give the horse space. Check for pain. Go back to groundwork. Rebuild trust in small, achievable steps. A horse that feels safe, heard, and physically comfortable has no reason to rear or buck.</p>`
      },
      {
        num: '05',
        category: 'Training',
        title: 'How do I calm a nervous or anxious horse?',
        excerpt: 'You cannot fight a nervous system. You can only offer it something steadier.',
        scene: 5,
        answer: `<p>The most powerful tool for calming an anxious horse is also the most underused: your own nervous system. Horses are masters of co-regulation. A frightened foal calms when it presses against its mother's side not because of any conscious decision, but because its nervous system synchronizes with hers. The same mechanism works between horse and human.</p><p>When a horse is escalating, move less, not more. Reduce stimulation in the environment. Soften your body from the inside out — release tension in your jaw, your shoulders, your hands. Breathe in a rhythm slower than the horse's current rhythm. Do not demand anything. Simply be present beside the horse with a quality of calm that is genuine, not performed.</p><div class="answer-key">You cannot fake calm to a horse. But you can practice genuine calm until it becomes the default. The horse will notice the moment it does.</div><p>Movement can also help if used correctly. Not frantic movement forced through anxiety, but deliberate, rhythmic, low-demand walking on a loose lead. This gives the horse an outlet for nervous energy without pushing it toward the thing it fears. Learn where touch calms your particular horse. For many, slow, firm strokes along the neck at the crest activate the parasympathetic nervous system. For others, touch during anxiety escalates. Know your horse.</p>`
      },
      {
        num: '06',
        category: 'Trust & Relationship',
        title: 'What are the signs my horse trusts me?',
        excerpt: 'Trust is not invisible. It is a behavior. And behavior can be read.',
        scene: 6,
        answer: `<p>The clearest sign of trust is voluntary approach. A horse that trusts you does not need to be caught. When you enter the field, it comes to you — not for food, but because your presence is comfortable and wanted. This is the horse voting with its feet. Nothing is more unambiguous.</p><p>The second sign is the quality of relaxation in your presence. A horse that trusts you will lower its head — a gesture of complete physical relaxation from an animal whose survival depends on keeping its head up. The lowered head is a deep exhale. It means: I am safe here.</p><p>The third sign is the breathing. A horse that feels safe breathes slowly and deeply, sometimes with long, audible sighs. Sit quietly beside a horse that trusts you and listen to its breath settle. It is one of the most peaceful sounds in the world.</p><div class="answer-key">The horse that lowers its head as you approach is not being polite. It is making itself vulnerable to you. Understand what that costs a prey animal, and you will understand what trust means.</div><p>The fourth sign is physical softness. A horse that trusts you will lean into your touch rather than away from it. It will allow you to handle its feet, its ears, its face without brace or resistance. This is not the stillness of a horse that has given up. It is the softness of a horse that genuinely does not feel the need to protect itself from you.</p>`
      },
      {
        num: '07',
        category: 'Behavior',
        title: 'Why does my horse bite or kick?',
        excerpt: 'Biting and kicking are not aggression. They are a horse that has run out of quieter ways to speak.',
        scene: 7,
        answer: `<p>Horses do not bite or kick without reason. These behaviors are almost always the final stage of communication — the loudest message from a horse that has been trying to tell you something in subtler ways and has been consistently ignored. Ears pinned. Tail swishing. Body tensing. Head turning away. All of these came before the bite or the kick. You just did not see them.</p><p>Pain is the most common underlying cause. A horse with gastric ulcers may bite when girthed. A horse with a sore hip may kick when the hind leg is handled. Before labeling a horse as aggressive, rule out physical causes thoroughly.</p><div class="answer-key">A horse that bites was not born mean. It learned that biting is the only message strong enough to make a human stop doing something painful or frightening.</div><p>What you can do: Learn to read the early warning signs. Pinned ears, a swishing tail, a hard eye, a tightened jaw — these are not the explosion. They are the warning before it. Respond to the warning by stepping back, assessing what the horse is reacting to, and addressing the cause. Never punish a horse for communicating. Punish the communication, and the horse will stop warning you before it bites or kicks — making the behavior far more dangerous.</p>`
      },
      {
        num: '08',
        category: 'Safety & Handling',
        title: 'How should I approach a horse for the first time?',
        excerpt: 'There is no second first meeting. What you bring to that moment, the horse will remember.',
        scene: 8,
        answer: `<p>The first impression you make on a horse is permanent. Everything you bring — your speed, your energy, the tension in your hands, the quality of your breath — the horse will carry forward into every interaction that follows. Getting it right is not about experience. It is about presence.</p><p>Never walk straight at a horse from the front with direct eye contact. This is predator behavior. Every cell in the horse's body reads this signal as a threat. Instead, approach at an angle. Let your path be curved, not straight. Soften your gaze. Move at a pace that is slower than your habitual pace — deliberate, unhurried, as if you have nowhere more important to be.</p><div class="answer-key">Walk toward a horse the way you would approach a sleeping child — with the understanding that how you arrive is already a conversation.</div><p>Approach from the side, toward the shoulder, where the horse can see you clearly. Speak softly. Let the horse turn toward you and acknowledge you before you close the final distance. When you are close enough, pause. Let the horse come the last step — even if it is just a nose stretched in your direction. That small offering of choice matters enormously. Your hands are the first language you speak. Make sure they are soft, warm, and listening.</p>`
      },
      {
        num: '09',
        category: 'Training',
        title: 'How do horses think differently from humans?',
        excerpt: 'Until you understand the equine mind, everything else is guesswork.',
        scene: 9,
        answer: `<p>Horses do not think in words. They do not sort their experience into reasons or explanations. They think in pictures, in feelings, in what is happening right now. A horse scared once by a white plastic bag does not remember that plastic bags are scary. It remembers the exact feeling of that moment — the sudden movement, the crinkle of sound, the rush of fear — and when it sees another plastic bag, it does not think. It simply feels the same feeling, and the body moves.</p><p>This is not stupidity. This is intelligence so sharp, so finely made, that it has kept horses alive for millions of years. A prey animal that had to stop and think before running did not survive long enough to have offspring. The horses alive today are the children of those who felt danger and moved before the thinking mind could catch up.</p><div class="answer-key">Every decision a horse makes is filtered through sixty million years of prey animal evolution. To understand a horse is to understand a mind built for a world where a single mistake means death.</div><p>Horses live entirely in the present moment. They are not worrying about tomorrow. They are not replaying yesterday. They are here, now, fully alive in this breath. This is why your inner state matters so much. The horse reads your tension, your breath, your intention — not your words. You cannot hide from a horse. And that honesty, once you learn to work with it rather than against it, is the greatest gift horsemanship offers.</p>`
      },
      {
        num: '10',
        category: 'Fear & Anxiety',
        title: 'Why does my horse refuse to load into a trailer?',
        excerpt: 'A horse that will not load is not being difficult. It is being honest about its fear.',
        scene: 10,
        answer: `<p>A horse trailer is, from the horse's perspective, a dark, enclosed, moving cave. Every instinct says: do not enter. Add to this the fact that many horses have had traumatic trailering experiences — rough driving, sharp turns, no ventilation, being tied too short or too long — and you have a recipe for genuine terror. The horse is not being stubborn. It is being a horse.</p><p>The most common mistake is trying to force the horse in. Pulling on the lead rope, tapping with a whip, or using ropes and pulleys may eventually get the horse into the trailer, but it destroys trust and confirms every fear the horse had. Next time will be worse.</p><div class="answer-key">You cannot argue a horse out of its fear. You can only give it enough safe experiences to outweigh the ones that were not.</div><p>What works: Make the trailer a place of rest, not pressure. Park it in the field and let the horse investigate it on its own time. Feed near it. Then inside it — without closing the door. Build positive associations over days or weeks, not hours. When the horse loads voluntarily, do not immediately drive away. Let it load, stand quietly, and unload. Repeat. Trust cannot be rushed. The horse that walks into the trailer with a low head and a soft eye is a horse that trusts you more than it fears the dark space.</p>`
      },
      {
        num: '11',
        category: 'Safety & Handling',
        title: 'How do I know if my horse is in pain?',
        excerpt: 'Horses hide pain. By the time you see it, it has been there for weeks.',
        scene: 11,
        answer: `<p>As prey animals, horses have evolved to conceal weakness. In the wild, a visibly injured horse is the first one targeted by predators. This means that by the time a horse is displaying obvious behavioral signs of pain, it has likely been suffering in silence for a considerable period.</p><p>The early signs are subtle. A slight change in performance — not wanting to pick up one lead, being stiff on one rein, rushing downhill. A shift in attitude — the horse that was previously willing becomes reluctant. Physical cues like a tight jaw, a hard eye, flinching when girthed, or standing with one hind leg slightly rested more often than usual.</p><div class="answer-key">Before you train the resistance out, make sure the resistance is not the horse asking for help.</div><p>Common sources of pain include the back (poor saddle fit), the hocks (arthritis), the teeth (sharp edges causing mouth pain), the feet (laminitis, abscesses, navicular), and the stomach (gastric ulcers are epidemic in domestic horses). If your horse's behavior changes — especially suddenly — your first call should be to a veterinarian, not a trainer. A horse in pain cannot learn. It can only endure.</p>`
      },
      {
        num: '12',
        category: 'Trust & Relationship',
        title: 'Can a horse really bond with a human?',
        excerpt: 'Yes. But not the way most people think. A horse bonds through trust, not affection.',
        scene: 12,
        answer: `<p>Yes. Absolutely. But it is not the sentimental, Disney version of bonding that many people imagine. Horses do not bond through treats or baby talk or the projection of human emotions onto them. They bond through trust. And trust, for a prey animal, is the most significant decision it can make. It is staking its survival on you.</p><p>When a horse bonds with a human, it is because that human has proven — over hundreds of interactions, across thousands of small moments — that they are safe. Consistent. Predictable. The horse's nervous system has learned to use the human's calm as a reference point. In the absence of horse companions, many horses will transfer their herd bonding to a human. They are not being sentimental. They are doing what their biology requires — finding something to trust.</p><div class="answer-key">When a horse turns to you in fear instead of running from you, you have become its herd. That is the whole of horsemanship.</div><p>The signs are unmistakable once you have seen them. The horse that seeks you out in the field — not for food, but simply to stand beside you. The horse that lowers its head and sighs when you approach. The horse that, when frightened, looks at you before deciding whether to run. These are not trained behaviors. They are the natural expression of a bond built on trust. And that bond, when it is real, is one of the most profound relationships a human being can experience.</p>`
      }
    ];

    // ═══════════════════════════════════════════════
    // BUILD QUESTION CARDS
    // ═══════════════════════════════════════════════
    const grid = document.getElementById('questionsGrid');
    questions.forEach((q, i) => {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.innerHTML = `
        <span class="q-card-category">${q.category}</span>
        <span class="q-card-num">${q.num}</span>
        <h3 class="q-card-title">${q.title}</h3>
        <p class="q-card-excerpt">${q.excerpt}</p>
        <span class="q-card-arrow">Read Answer →</span>
      `;
      card.addEventListener('click', () => openAnswer(i));
      grid.appendChild(card);
    });

    // Scroll reveal
    const cardObserver = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) {
          setTimeout(() => e.target.classList.add('visible'), i * 80);
          cardObserver.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.q-card').forEach(c => cardObserver.observe(c));

    // ═══════════════════════════════════════════════
    // ANSWER PANEL
    // ═══════════════════════════════════════════════
    const answerPanel = document.getElementById('answerPanel');
    const answerContent = document.getElementById('answerContent');
    const answerViewer = document.getElementById('answerViewer');
    let currentQ = -1;

    function openAnswer(i) {
      currentQ = i;
      const q = questions[i];
      activeScene = q.scene;

      // Update hero text
      document.getElementById('heroTitle').innerHTML = q.title.split('?')[0] + '<span class="gold">?</span>';
      document.getElementById('heroTagline').textContent = q.excerpt;

      // Highlight active card
      document.querySelectorAll('.q-card').forEach((c, idx) => c.classList.toggle('active', idx === i));

      answerContent.innerHTML = `
        <span class="answer-num">Question ${q.num} · ${q.category}</span>
        <h2 class="answer-title">${q.title}</h2>
        <div class="answer-body">${q.answer}</div>
        <div class="answer-nav">
          <button class="answer-nav-btn" id="answerPrev">← Previous</button>
          <span class="answer-nav-count">${q.num} / 12</span>
          <button class="answer-nav-btn" id="answerNext">Next →</button>
        </div>
      `;

      document.getElementById('answerPrev').addEventListener('click', () => {
        const prev = (currentQ - 1 + questions.length) % questions.length;
        openAnswer(prev);
      });
      document.getElementById('answerNext').addEventListener('click', () => {
        const next = (currentQ + 1) % questions.length;
        openAnswer(next);
      });

      answerPanel.classList.add('open');
      answerViewer.scrollTop = 0;
      document.body.style.overflow = 'hidden';
    }

    function closeAnswer() {
      answerPanel.classList.remove('open');
      document.body.style.overflow = '';
      activeScene = -1;
      document.getElementById('heroTitle').innerHTML = 'Quest<span class="gold">ions</span>';
      document.getElementById('heroTagline').textContent = 'Straight from the arena. No theories. Only what works.';
      document.querySelectorAll('.q-card').forEach(c => c.classList.remove('active'));
    }

    document.getElementById('answerClose').addEventListener('click', closeAnswer);
    document.getElementById('answerBackdrop').addEventListener('click', closeAnswer);
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && answerPanel.classList.contains('open')) closeAnswer();
      if (answerPanel.classList.contains('open')) {
        if (e.key === 'ArrowRight') { const next = (currentQ + 1) % questions.length; openAnswer(next); }
        if (e.key === 'ArrowLeft') { const prev = (currentQ - 1 + questions.length) % questions.length; openAnswer(prev); }
      }
    });
  </script>

</body>
</html>
